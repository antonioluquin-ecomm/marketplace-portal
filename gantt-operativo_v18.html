<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirigiendo a Gantt Operativo | Marketplace Portal</title>
  <meta http-equiv="refresh" content="0; url=internal/gantt/gantt-operativo.html">
  <script>
    (function () {
      var base = "internal/gantt/gantt-operativo.html";
      var target = base + window.location.search + window.location.hash;
      var setManualLink = function () {
        var link = document.getElementById("manual-link");
        if (link) link.href = target;
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", setManualLink);
      } else {
        setManualLink();
      }

      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirigiendo a la nueva pagina de Gantt Operativo...</p>
  <p><a id="manual-link" href="internal/gantt/gantt-operativo.html">Abrir nueva pagina</a></p>
</body>
</html>
