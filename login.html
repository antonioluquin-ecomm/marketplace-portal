<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ingresar — Marketplace Portal</title>
<script src="assets/js/theme.js"></script>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/tokens.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font);
    color: var(--text);
    background:
      linear-gradient(180deg, rgba(37, 182, 12, .045) 0, rgba(37, 182, 12, 0) 210px),
      var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0 0 auto;
    height: 4px;
    background: var(--primary);
    pointer-events: none;
  }
  .login-wrap {
    width: 100%;
    max-width: 392px;
    transform: translateY(-2vh);
  }

  .login-header {
    text-align: center;
    margin-bottom: 18px;
  }
  .login-logo {
    display: block;
    width: 188px;
    height: auto;
    margin: 0 auto 16px;
  }
  .login-kicker {
    margin-bottom: 5px;
    color: var(--primary);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
  }
  .login-app-name {
    color: var(--text);
    font-size: 22px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: 0;
  }
  .login-app-sub {
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .login-card {
    padding: 30px;
    background: rgba(255, 255, 255, .92);
    border: 1px solid color-mix(in srgb, var(--line) 88%, transparent);
    border-radius: 8px;
    box-shadow: 0 18px 46px rgba(17, 24, 39, .10);
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    margin-bottom: 7px;
    color: var(--text);
    font-size: 12.5px;
    font-weight: 500;
  }
  .field input {
    width: 100%;
    height: 42px;
    padding: 0 12px;
    color: var(--text);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    outline: none;
    font-family: inherit;
    font-size: 14px;
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  .field input::placeholder { color: color-mix(in srgb, var(--muted) 72%, white); }
  .field input:focus {
    background: #fff;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 14%, transparent);
  }

  .btn-login {
    width: 100%;
    height: 42px;
    margin-top: 6px;
    border: 0;
    border-radius: 8px;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    transition: background .15s, transform .15s, box-shadow .15s;
  }
  .btn-login:hover:not(:disabled) {
    background: var(--primary-hover);
    box-shadow: 0 10px 24px color-mix(in srgb, var(--primary) 22%, transparent);
    transform: translateY(-1px);
  }
  .btn-login:focus-visible {
    outline: 3px solid color-mix(in srgb, var(--primary) 22%, transparent);
    outline-offset: 2px;
  }
  .btn-login:disabled { opacity: .6; cursor: default; transform: none; box-shadow: none; }

  .alert-err {
    margin-top: 14px;
    padding: 10px 12px;
    background: var(--danger-bg);
    border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent);
    border-radius: 8px;
    color: var(--danger);
    font-size: 13px;
    line-height: 1.45;
  }

  .login-footer {
    margin-top: 16px;
    text-align: center;
    color: var(--muted);
    font-size: 11.5px;
  }

  @media (max-width: 480px) {
    body { padding: 18px; align-items: flex-start; padding-top: 64px; }
    .login-wrap { transform: none; max-width: 100%; }
    .login-logo { width: 174px; }
    .login-card { padding: 22px; }
  }
</style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <img class="login-logo" src="assets/brand/marketplace-logo.svg" alt="Sporting Marketplace" />
      <div class="login-kicker">Acceso interno</div>
      <div class="login-app-name">Marketplace Portal</div>
      <div class="login-app-sub">Sporting Marketplace</div>
    </div>
    <div class="login-card">
      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" name="email"
                 placeholder="usuario@empresa.com" autocomplete="email" autofocus />
        </div>
        <div class="field">
          <label for="login-pwd">Contraseña</label>
          <input type="password" id="login-pwd" name="password"
                 placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login" id="btn-login">Ingresar</button>
      </form>
      <div class="alert-err" id="login-err" hidden></div>
    </div>
    <div class="login-footer">Herramienta interna — acceso restringido</div>
  </div>

  <script src="assets/js/config.js"></script>
  <script>
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Redirigir si ya hay sesión válida
    (function () {
      try {
        const d = JSON.parse(localStorage.getItem('mp_session') || 'null');
        if (d && d.expira_en && new Date(d.expira_en) > new Date()) {
          window.location.href = 'index.html';
        }
      } catch (_) {}
    })();

    const form  = document.getElementById('loginForm');
    const errEl = document.getElementById('login-err');
    const btn   = document.getElementById('btn-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-pwd').value;
      errEl.hidden = true;

      if (!email || !password) {
        errEl.textContent = 'Completá los dos campos.';
        errEl.hidden = false;
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Verificando…';

      try {
        const apiUrl = window.MP_CONFIG && window.MP_CONFIG.APPS_SCRIPT_URL;
        if (!apiUrl) throw new Error('No hay URL de API configurada.');
        const password_hash = await sha256(password);
        const res = await fetch(apiUrl, {
          method: 'POST',
          body:   JSON.stringify({ action: 'login', email, password_hash }),
        });
        if (!res.ok) throw new Error('Error de conexión (' + res.status + ').');
        const json = await res.json();
        if (!json.ok) throw new Error(json.error || 'Credenciales incorrectas.');
        if (json.usuario && json.usuario.seller_id) {
          throw new Error('Esta cuenta es de seller. Ingresá en el Portal de Sellers (public/login.html).');
        }

        localStorage.setItem('mp_session', JSON.stringify({
          session_token: json.session_token,
          usuario:       json.usuario,
          permisos:      json.permisos,
          expira_en:     json.expira_en,
        }));
        window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent = err.message || 'Error al iniciar sesión. Verificá tu conexión.';
        errEl.hidden = false;
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
