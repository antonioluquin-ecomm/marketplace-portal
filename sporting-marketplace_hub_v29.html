<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirigiendo al Hub Operativo | Marketplace Portal</title>
  <meta http-equiv="refresh" content="0; url=internal/hub-operativo.html">
  <script>
    (function () {
      var baseTarget = "internal/hub-operativo.html";
      var target = baseTarget + window.location.search + window.location.hash;

      function updateManualLink() {
        var link = document.getElementById("manual-link");
        if (link) link.setAttribute("href", target);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", updateManualLink);
      } else {
        updateManualLink();
      }

      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirigiendo al Hub Operativo del Marketplace Portal...</p>
  <p><a id="manual-link" href="internal/hub-operativo.html">Abrir Hub Operativo</a></p>
</body>
</html>
