<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirigiendo a Simulador Seller | Marketplace Portal</title>
  <meta http-equiv="refresh" content="0; url=public/simuladores/simulador-seller.html">
  <script>
    (function () {
      var base = "public/simuladores/simulador-seller.html";
      var target = base + window.location.search + window.location.hash;
      var setManualLink = function () {
        var link = document.getElementById("manual-link");
        if (link) link.href = target;
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", setManualLink);
      } else {
        setManualLink();
      }

      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirigiendo a la nueva pagina de Simulador Seller...</p>
  <p><a id="manual-link" href="public/simuladores/simulador-seller.html">Abrir nueva pagina</a></p>
</body>
</html>
