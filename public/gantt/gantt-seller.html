<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gantt de tu proyecto | Marketplace Sporting</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root{
    --g:#5ea832;--g2:#4a8a26;
    --g-dim:rgba(94,168,50,.12);--g-brd:rgba(94,168,50,.28);
    --k:#09100a;--k3:#131b12;
    --t1:#edf3e9;--t2:#c4d8bb;--t3:#8fab86;--t4:#5a7054;
    --bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.05);
    --info:#64b5f6;--warn:#ffb74d;--danger:#e5484d;
    --tb:64px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Barlow,system-ui,sans-serif;background:var(--k);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:50;height:var(--tb);display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(9,16,10,.96);border-bottom:1px solid var(--g-brd);backdrop-filter:blur(20px)}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:.03em;color:var(--t1)}
  .logo span{color:var(--g)}
  .crumb{border-left:1px solid var(--bdr);padding-left:14px;font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--t3)}
  .top-actions a{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);border:1px solid var(--bdr);padding:7px 12px;border-radius:7px;transition:.15s}
  .top-actions a:hover{border-color:var(--g-brd);color:var(--t1)}

  .main{max-width:900px;margin:0 auto;padding:calc(var(--tb) + 40px) 32px 80px}
  .hero-eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:14px;font-size:10px;font-weight:900;letter-spacing:.22em;text-transform:uppercase;color:var(--g)}
  .hero-eyebrow::before{content:"";width:24px;height:2px;background:var(--g)}
  h1{font-family:"Barlow Condensed",sans-serif;font-size:clamp(28px,4vw,40px);font-weight:900;text-transform:uppercase;letter-spacing:.01em;margin-bottom:10px}
  .lead{font-size:13.5px;line-height:1.6;color:var(--t3);max-width:600px;margin-bottom:34px}

  .fase-block{margin-bottom:28px}
  .fase-title{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bdr2)}

  .task-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--bdr);border-radius:12px;background:linear-gradient(160deg,rgba(25,33,24,.95),rgba(14,22,14,.98));margin-bottom:8px}
  .task-main{flex:1;min-width:0}
  .task-name{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px}
  .task-meta{font-size:11.5px;color:var(--t3)}
  .task-dates{font-size:11.5px;color:var(--t4);white-space:nowrap;text-align:right}
  .badge{flex-shrink:0;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
  .badge.pendiente{background:rgba(255,255,255,.06);color:var(--t3)}
  .badge.en-curso{background:rgba(100,181,246,.14);color:var(--info)}
  .badge.bloqueado{background:rgba(229,72,77,.14);color:var(--danger)}
  .badge.completado{background:var(--g-dim);color:var(--g)}
  .badge.cancelado{background:rgba(255,255,255,.04);color:var(--t4);text-decoration:line-through}

  .empty{padding:32px;border:1px dashed var(--bdr);border-radius:14px;color:var(--t3);font-size:13px;text-align:center}
  .err{padding:16px;border:1px solid rgba(229,72,77,.3);background:rgba(229,72,77,.08);border-radius:10px;color:var(--danger);font-size:13px}

  @media(max-width:640px){.main{padding:calc(var(--tb) + 30px) 18px 60px}.task-card{flex-wrap:wrap}.task-dates{text-align:left}}
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">SPORTING <span>MARKETPLACE</span></span>
      <div class="crumb">Tu Gantt</div>
    </div>
    <div class="top-actions"><a href="../index.html">← Portal de Sellers</a></div>
  </header>

  <main class="main">
    <div class="hero-eyebrow">Seguimiento</div>
    <h1>Gantt de tu proyecto</h1>
    <p class="lead">Estado y fechas de las tareas de tu proceso de integración con Sporting Marketplace. Vista de solo lectura.</p>

    <div id="content"><div class="empty">Cargando…</div></div>
  </main>

  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/auth-seller.js"></script>
  <script>
    const FASES_ORDEN = ["Comercial", "Técnica", "Operativa", "QA/Validación", "Go Live"];

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    const norm = s => String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');

    function parseDate(raw) {
      if (!raw || !String(raw).trim() || String(raw).trim() === '—') return null;
      const s = String(raw).trim();
      const serial = parseFloat(s);
      if (!isNaN(serial) && serial > 40000 && serial < 60000 && !/[-\/]/.test(s)) {
        const excelEpoch = new Date(1899, 11, 30);
        const d = new Date(excelEpoch.getTime() + Math.round(serial) * 86400000);
        d.setHours(0, 0, 0, 0);
        return d;
      }
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) { const d = new Date(s + 'T00:00:00'); return isNaN(d) ? null : d; }
      if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
        const [dd, mm, yy] = s.split('/');
        const d = new Date(`${yy}-${mm}-${dd}T00:00:00`); return isNaN(d) ? null : d;
      }
      const d = new Date(s); return isNaN(d.getTime()) ? null : d;
    }

    function fmtDate(d) {
      if (!d) return '—';
      return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function estadoNorm(v) {
      if (!v) return 'Pendiente';
      const n = norm(v);
      if (n.includes('completado') || n.includes('done')) return 'Completado';
      if (n.includes('curso') || n.includes('progreso')) return 'En curso';
      if (n.includes('bloqueado')) return 'Bloqueado';
      if (n.includes('cancelado')) return 'Cancelado';
      return 'Pendiente';
    }

    function parseCSV(text) {
      const rows = []; let row = []; let cell = ''; let q = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i], n = text[i + 1];
        if (c === '"') { if (q && n === '"') { cell += '"'; i++; } else q = !q; }
        else if (c === ',' && !q) { row.push(cell); cell = ''; }
        else if ((c === '\n' || c === '\r') && !q) { if (c === '\r' && n === '\n') i++; row.push(cell); rows.push(row); row = []; cell = ''; }
        else cell += c;
      }
      row.push(cell); if (row.length > 1 || row[0] !== '') rows.push(row);
      return rows;
    }

    function csvToObjects(text, keyTests) {
      const matrix = parseCSV(text);
      const valid = matrix.filter(r => r.some(v => String(v || '').trim()));
      const hi = valid.findIndex(r => r.some(v => keyTests.some(t => norm(v).includes(t))));
      if (hi === -1) throw new Error('No se encontró fila de encabezados.');
      const headers = valid[hi].map(h => norm(h));
      const out = [];
      for (let i = hi + 1; i < valid.length; i++) {
        const r = valid[i];
        if (!r.some(v => String(v || '').trim())) continue;
        const obj = {};
        headers.forEach((h, idx) => obj[h] = String(r[idx] || '').trim());
        out.push(obj);
      }
      return out;
    }

    function normalizeTasks(rows, sellerId) {
      return rows.filter(r => {
        const id = r.task_id || r.id_tarea;
        if (!id || !/^SPT-/i.test(String(id).trim())) return false;
        return String(r.seller_id || '').trim().toUpperCase() === sellerId.toUpperCase();
      }).map(r => ({
        task_id:     r.task_id || r.id_tarea || '',
        fase:        r.fase || 'Sin fase',
        hito:        r.hito || '',
        tarea:       r.tarea || '',
        responsable: r.responsable || '',
        inicio:      parseDate(r.inicio || r.fecha_inicio_plan || r.inicio_plan),
        fin:         parseDate(r.fin || r.fecha_fin_plan || r.fin_plan),
        estado:      estadoNorm(r.estado_tarea || r.estado),
        visible:     norm(r.ver_en_gantt || r.visible_gantt || r.visible || 'si') !== 'no',
      })).filter(t => t.visible);
    }

    function renderTasks(tasks) {
      const content = document.getElementById('content');
      if (!tasks.length) {
        content.innerHTML = '<div class="empty">Todavía no hay tareas cargadas para tu proyecto.</div>';
        return;
      }

      const byFase = {};
      tasks.forEach(t => {
        if (!byFase[t.fase]) byFase[t.fase] = [];
        byFase[t.fase].push(t);
      });

      const fasesPresentes = Object.keys(byFase).sort((a, b) => {
        const ia = FASES_ORDEN.indexOf(a), ib = FASES_ORDEN.indexOf(b);
        return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
      });

      content.innerHTML = fasesPresentes.map(function (fase) {
        const items = byFase[fase].slice().sort((a, b) => (a.inicio || 0) - (b.inicio || 0));
        return '<div class="fase-block">' +
          '<div class="fase-title">' + fase + '</div>' +
          items.map(function (t) {
            const badgeClass = norm(t.estado).replace(/_/g, '-');
            return '<div class="task-card">' +
              '<div class="task-main">' +
                '<div class="task-name">' + escapeHtml(t.tarea || t.hito || t.task_id) + '</div>' +
                '<div class="task-meta">' + escapeHtml(t.responsable || 'Sin responsable asignado') + '</div>' +
              '</div>' +
              '<span class="badge ' + badgeClass + '">' + t.estado + '</span>' +
              '<div class="task-dates">' + fmtDate(t.inicio) + ' → ' + fmtDate(t.fin) + '</div>' +
            '</div>';
          }).join('') +
        '</div>';
      }).join('');
    }

    async function loadGantt() {
      const content = document.getElementById('content');
      try {
        const url = window.MP_CONFIG.CSV.TIMELINE + '&_ts=' + Date.now();
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const rows = csvToObjects(text, ['task_id', 'id_tarea', 'id tarea', 'seller_id']);
        const tasks = normalizeTasks(rows, SellerSESSION.sellerId);
        renderTasks(tasks);
      } catch (e) {
        content.innerHTML = '<div class="err">No se pudo cargar el Gantt. Intentá de nuevo más tarde.</div>';
      }
    }

    initSellerAuth().then(loadGantt);
  </script>
</body>
</html>
